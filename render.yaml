services:
  - type: web
    name: cfa-quiz-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 3 --timeout 60 --keep-alive 5 app:app
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: RENDER
        value: "true"